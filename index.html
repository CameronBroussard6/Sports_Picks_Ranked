<!DOCTYPE html>
<html>
<head>
    <title>Daily Pick Rankings</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 40px; background: #f4f4f9; }
        table { border-collapse: collapse; width: 100%; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #2c3e50; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .MAX-BET { color: green; font-weight: bold; }
        .VALUE { color: blue; }
        .SKIP { color: gray; }
    </style>
</head>
<body>
    <h1>Daily Sports Pick Rankings</h1>
    <p>Automatically ranked by ROI, Momentum, and Niche Market Edge.</p>
    <div id="table-container"></div>

    <script>
        Papa.parse("public_picks.csv", {
            download: true,
            header: true,
            complete: function(results) {
                let data = results.data;
                let table = '<table><thead><tr>';
                Object.keys(data[0]).forEach(key => table += `<th>${key}</th>`);
                table += '</tr></thead><tbody>';
                data.forEach(row => {
                    if(!row.Action) return;
                    table += '<tr>';
                    Object.values(row).forEach(val => {
                        let className = (val === "MAX BET" || val === "VALUE" || val === "SKIP") ? val.replace(" ", "-") : "";
                        table += `<td class="${className}">${val}</td>`;
                    });
                    table += '</tr>';
                });
                table += '</tbody></table>';
                document.getElementById('table-container').innerHTML = table;
            }
        });
    </script>
</body>
</html>
