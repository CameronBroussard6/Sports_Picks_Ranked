<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharp Ranker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --primary: #007bff;
            --text: #ffffff; 
            --win: #2ecc71;  /* Green for MAX BET */
            --value: #3498db; /* Blue for VALUE */
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 20px;
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.4;
        }

        .container { max-width: 900px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 25px; }
        h1 { margin-bottom: 5px; color: #fff; font-size: 1.8rem; }
        .subtitle { color: #888; font-size: 0.85em; }

        .tabs { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 20px; 
            justify-content: center;
        }

        .tab-btn { 
            padding: 10px 20px; 
            cursor: pointer; 
            background: #2a2a2a; 
            border: 1px solid #333; 
            color: #bbb; 
            border-radius: 6px;
            font-weight: bold;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .tab-btn.active { 
            background: var(--primary); 
            color: white; 
            border-color: var(--primary);
        }

        .table-wrapper {
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            overflow: hidden;
        }

        table { 
            border-collapse: collapse; 
            width: 100%; 
            table-layout: auto;
        }

        th, td { 
            padding: 14px 12px; 
            text-align: left; 
            border-bottom: 1px solid #2d2d2d; 
            color: #ffffff !important; /* Force all text to white */
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        
        th { 
            background-color: #252525; 
            color: #ffffff !important;
            text-transform: uppercase; 
            font-size: 0.7rem; 
            letter-spacing: 1px;
        }

        /* Status colors override the white text for the first column only */
        .MAX-BET { color: var(--win) !important; font-weight: bold; }
        .VALUE { color: var(--value) !important; font-weight: bold; }
        .SKIP { color: #ffffff !important; font-weight: normal; opacity: 0.7; }

        .score-pill { 
            background: #333; 
            padding: 4px 8px; 
            border-radius: 4px; 
            font-family: monospace;
            font-weight: bold;
            color: #fff !important;
        }

        .odds-badge {
            background: #2c2c2c;
            padding: 4px 6px;
            border-radius: 4px;
            border: 1px solid #444;
            color: #ffffff !important;
            font-weight: 600;
        }

        #last-updated {
            text-align: center;
            font-size: 0.7rem;
            color: #444;
            margin-top: 20px;
        }

        /* MOBILE OPTIMIZATION: NO HORIZONTAL SCROLLING */
        @media screen and (max-width: 650px) {
            body { padding: 10px; }
            
            table, thead, tbody, th, td, tr { display: block; }
            
            thead { display: none; } /* Hide headers on mobile */
            
            tr { 
                margin-bottom: 15px; 
                border-bottom: 2px solid #333;
                padding: 10px 0;
            }

            td { 
                border: none; 
                padding: 8px 10px; 
                position: relative;
                padding-left: 40%; 
                text-align: right;
                font-size: 0.9rem;
                min-height: 25px;
            }

            /* This inserts the Header label on the left side of the mobile "card" */
            td:before { 
                content: attr(data-label);
                position: absolute;
                left: 10px;
                width: 35%;
                text-align: left;
                font-weight: bold;
                font-size: 0.7rem;
                color: #888;
                text-transform: uppercase;
            }

            /* Make "The Pick" the focus of the card */
            td[data-label="The Pick"] {
                text-align: left;
                padding-left: 10px;
                padding-top: 35px;
                display: block;
                font-size: 1rem;
                border-top: 1px solid #2d2d2d;
                margin-top: 5px;
            }
            td[data-label="The Pick"]:before {
                top: 10px;
                width: 100%;
            }
        }

        .loading { padding: 40px; text-align: center; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Sharp Ranker</h1>
        <div class="subtitle">Real-Time Consensus & Value Analysis</div>
    </header>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="loadData('ranked_today.csv', this)">Today</button>
        <button class="tab-btn" onclick="loadData('ranked_tomorrow.csv', this)">Tomorrow</button>
    </div>

    <div class="table-wrapper">
        <div id="table-container" class="loading">Fetching latest data...</div>
    </div>

    <div id="last-updated"></div>
</div>

<script>
    function loadData(file, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        document.getElementById('table-container').innerHTML = '<div class="loading">Loading fresh lines...</div>';

        Papa.parse(file + "?v=" + Date.now(), {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                let data = results.data;
                
                if (data.length === 0 || !data[0].Score) {
                    document.getElementById('table-container').innerHTML = "<div class='loading'>No active picks found at this moment.</div>";
                    return;
                }

                // Ensure strict sorting by Score descending
                data.sort((a, b) => parseFloat(b.Score) - parseFloat(a.Score));

                let table = '<table><thead><tr>';
                let headers = Object.keys(data[0]);
                headers.forEach(key => table += `<th>${key}</th>`);
                table += '</tr></thead><tbody>';
                
                data.forEach(row => {
                    table += '<tr>';
                    Object.entries(row).forEach(([key, val]) => {
                        let cellClass = "";
                        let displayVal = val;

                        if (val === "MAX BET") cellClass = "MAX-BET";
                        if (val === "VALUE") cellClass = "VALUE";
                        if (val === "SKIP") cellClass = "SKIP";
                        
                        if (key === "Score") {
                            displayVal = `<span class="score-pill">${val}</span>`;
                        }
                        if (key === "Odds") {
                            displayVal = `<span class="odds-badge">${val > 0 ? '+' + val : val}</span>`;
                        }

                        // data-label allows the CSS to show the header name on mobile
                        table += `<td class="${cellClass}" data-label="${key}">${displayVal}</td>`;
                    });
                    table += '</tr>';
                });

                table += '</tbody></table>';
                document.getElementById('table-container').innerHTML = table;
                document.getElementById('last-updated').innerText = "Last Checked: " + new Date().toLocaleTimeString();
            }
        });
    }

    // Initial load
    window.onload = () => loadData('ranked_today.csv', document.querySelector('.tab-btn'));
</script>

</body>
</html>
