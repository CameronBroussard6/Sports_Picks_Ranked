<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharp Ranker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --primary: #007bff;
            --text: #ffffff; 
            --win: #2ecc71;
            --value: #3498db;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            padding: 10px;
            background: var(--bg); 
            color: var(--text); 
        }

        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 15px; }
        h1 { margin: 0; color: #fff; font-size: clamp(1.2rem, 4vw, 1.8rem); }
        .subtitle { color: #888; font-size: 0.8em; margin-top: 4px; }

        .tabs { display: flex; gap: 6px; margin-bottom: 15px; justify-content: center; }
        .tab-btn { 
            padding: 8px 14px; 
            cursor: pointer; 
            background: #2a2a2a; 
            border: 1px solid #444; 
            color: #bbb; 
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.8rem;
        }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .table-wrapper {
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid #333;
            width: 100%;
        }

        table { 
            border-collapse: collapse; 
            width: 100%; 
            table-layout: fixed; /* Maintains structure */
        }

        th, td { 
            padding: 10px 6px; 
            text-align: left; 
            border-bottom: 1px solid #2d2d2d; 
            color: #ffffff !important;
            /* Fluid font size: scales between 10px and 14px based on screen width */
            font-size: clamp(0.65rem, 2.5vw, 0.9rem);
            line-height: 1.1;
            vertical-align: middle;
        }

        /* Column Width Allocation */
        th:nth-child(1), td:nth-child(1) { width: 20%; white-space: nowrap; } /* Action */
        th:nth-child(2), td:nth-child(2) { width: 14%; white-space: nowrap; } /* Score */
        th:nth-child(3), td:nth-child(3) { 
            width: 48%; 
            white-space: normal; /* ALLOW WRAPPING HERE */
            word-break: break-word; /* Prevents long words from breaking layout */
        }
        th:nth-child(4), td:nth-child(4) { width: 18%; white-space: nowrap; text-align: center; } /* Odds */

        th { 
            background-color: #252525; 
            font-size: 0.6rem; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Status Colors */
        .MAX-BET { color: var(--win) !important; font-weight: bold; }
        .VALUE { color: var(--value) !important; font-weight: bold; }
        .SKIP { color: #ffffff !important; opacity: 0.5; }

        .score-pill { 
            background: #333; 
            padding: 2px 5px; 
            border-radius: 4px; 
            font-family: monospace;
            font-weight: bold;
        }

        .odds-badge {
            background: #2c2c2c;
            padding: 3px 6px;
            border-radius: 4px;
            border: 1px solid #444;
            font-weight: 600;
        }

        #last-updated { text-align: center; font-size: 0.65rem; color: #555; margin-top: 15px; }
        .loading { padding: 40px; text-align: center; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Sharp Ranker</h1>
        <div class="subtitle">Consensus & Data-Driven Sports Analysis</div>
    </header>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="loadData('ranked_today.csv', this)">Today</button>
        <button class="tab-btn" onclick="loadData('ranked_tomorrow.csv', this)">Tomorrow</button>
    </div>

    <div class="table-wrapper">
        <div id="table-container" class="loading">Fetching current market data...</div>
    </div>

    <div id="last-updated"></div>
</div>

<script>
    function loadData(file, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('table-container').innerHTML = '<div class="loading">Updating picks...</div>';

        Papa.parse(file + "?v=" + Date.now(), {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                let data = results.data;
                if (data.length === 0 || !data[0].Score) {
                    document.getElementById('table-container').innerHTML = "<div class='loading'>No active picks. Check back in an hour.</div>";
                    return;
                }

                data.sort((a, b) => parseFloat(b.Score) - parseFloat(a.Score));

                let table = '<table><thead><tr>';
                Object.keys(data[0]).forEach(key => table += `<th>${key}</th>`);
                table += '</tr></thead><tbody>';
                
                data.forEach(row => {
                    table += '<tr>';
                    Object.entries(row).forEach(([key, val]) => {
                        let cellClass = "";
                        let displayVal = val;
                        if (val === "MAX BET") cellClass = "MAX-BET";
                        if (val === "VALUE") cellClass = "VALUE";
                        if (val === "SKIP") cellClass = "SKIP";
                        
                        if (key === "Score") displayVal = `<span class="score-pill">${val}</span>`;
                        if (key === "Odds") displayVal = `<span class="odds-badge">${val > 0 ? '+' + val : val}</span>`;

                        table += `<td class="${cellClass}">${displayVal}</td>`;
                    });
                    table += '</tr>';
                });

                table += '</tbody></table>';
                document.getElementById('table-container').innerHTML = table;
                document.getElementById('last-updated').innerText = "Last Checked: " + new Date().toLocaleTimeString();
            }
        });
    }
    window.onload = () => loadData('ranked_today.csv', document.querySelector('.tab-btn'));
</script>

</body>
</html>
