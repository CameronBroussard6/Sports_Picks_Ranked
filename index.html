<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharp Ranker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --primary: #007bff;
            --text: #ffffff; 
            --win: #2ecc71;
            --value: #3498db;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 10px; /* Reduced padding for mobile edge-to-edge */
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.2;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 15px; }
        h1 { margin-bottom: 5px; color: #fff; font-size: 1.5rem; }
        .subtitle { color: #888; font-size: 0.8em; }

        .tabs { display: flex; gap: 8px; margin-bottom: 15px; justify-content: center; }

        .tab-btn { 
            padding: 8px 16px; 
            cursor: pointer; 
            background: #2a2a2a; 
            border: 1px solid #333; 
            color: #bbb; 
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* TABLE SETTINGS FOR NO-WRAP */
        .table-wrapper {
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid #333;
            width: 100%;
            overflow: hidden; /* No container scroll */
        }

        table { 
            border-collapse: collapse; 
            width: 100%; 
            table-layout: fixed; /* Force fixed widths */
        }

        th, td { 
            padding: 10px 8px; 
            text-align: left; 
            border-bottom: 1px solid #2d2d2d; 
            color: #ffffff !important;
            white-space: nowrap; /* PREVENTS WRAPPING */
            overflow: hidden;    /* HIDES OVERFLOW */
            text-overflow: ellipsis; /* ADDS "..." IF TOO LONG */
        }
        
        /* Column Width Allocations */
        th:nth-child(1), td:nth-child(1) { width: 22%; } /* Action */
        th:nth-child(2), td:nth-child(2) { width: 12%; } /* Score */
        th:nth-child(3), td:nth-child(3) { width: 48%; } /* The Pick */
        th:nth-child(4), td:nth-child(4) { width: 18%; } /* Odds */

        th { 
            background-color: #252525; 
            font-size: 0.65rem; 
            text-transform: uppercase;
        }

        /* Shrink text on smaller screens */
        @media screen and (max-width: 600px) {
            td, th { font-size: 0.7rem; padding: 8px 4px; }
            .score-pill { padding: 2px 4px; }
            .odds-badge { padding: 2px 4px; }
        }

        @media screen and (max-width: 400px) {
            td, th { font-size: 0.6rem; }
        }

        .MAX-BET { color: var(--win) !important; font-weight: bold; }
        .VALUE { color: var(--value) !important; font-weight: bold; }
        .SKIP { color: #ffffff !important; opacity: 0.6; }

        .score-pill { 
            background: #333; 
            padding: 3px 6px; 
            border-radius: 4px; 
            font-family: monospace;
            color: #fff !important;
        }

        .odds-badge {
            background: #2c2c2c;
            padding: 3px 5px;
            border-radius: 3px;
            border: 1px solid #444;
            color: #ffffff !important;
        }

        #last-updated { text-align: center; font-size: 0.65rem; color: #444; margin-top: 15px; }
        .loading { padding: 30px; text-align: center; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Sharp Ranker</h1>
        <div class="subtitle">Consensus & Value Analysis</div>
    </header>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="loadData('ranked_today.csv', this)">Today</button>
        <button class="tab-btn" onclick="loadData('ranked_tomorrow.csv', this)">Tomorrow</button>
    </div>

    <div class="table-wrapper">
        <div id="table-container" class="loading">Fetching...</div>
    </div>

    <div id="last-updated"></div>
</div>

<script>
    function loadData(file, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('table-container').innerHTML = '<div class="loading">Updating...</div>';

        Papa.parse(file + "?v=" + Date.now(), {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                let data = results.data;
                if (data.length === 0 || !data[0].Score) {
                    document.getElementById('table-container').innerHTML = "<div class='loading'>No picks active.</div>";
                    return;
                }

                data.sort((a, b) => parseFloat(b.Score) - parseFloat(a.Score));

                let table = '<table><thead><tr>';
                Object.keys(data[0]).forEach(key => table += `<th>${key}</th>`);
                table += '</tr></thead><tbody>';
                
                data.forEach(row => {
                    table += '<tr>';
                    Object.entries(row).forEach(([key, val]) => {
                        let cellClass = "";
                        let displayVal = val;
                        if (val === "MAX BET") cellClass = "MAX-BET";
                        if (val === "VALUE") cellClass = "VALUE";
                        if (val === "SKIP") cellClass = "SKIP";
                        
                        if (key === "Score") displayVal = `<span class="score-pill">${val}</span>`;
                        if (key === "Odds") displayVal = `<span class="odds-badge">${val > 0 ? '+' + val : val}</span>`;

                        // The "title" attribute lets you see the full text if you hover/long-press
                        table += `<td class="${cellClass}" title="${val}">${displayVal}</td>`;
                    });
                    table += '</tr>';
                });

                table += '</tbody></table>';
                document.getElementById('table-container').innerHTML = table;
                document.getElementById('last-updated').innerText = "Updated: " + new Date().toLocaleTimeString();
            }
        });
    }
    window.onload = () => loadData('ranked_today.csv', document.querySelector('.tab-btn'));
</script>

</body>
</html>
